name = "pxi-api"
main = "api.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[env.staging]
name = "pxi-api-staging"
workers_dev = true

# Provision isolated staging resources before deploying this environment.
[[env.staging.d1_databases]]
binding = "DB"
database_name = "pxi-db-staging"
database_id = "00000000-0000-0000-0000-000000000001"
migrations_dir = "migrations"

[[env.staging.vectorize]]
binding = "VECTORIZE"
index_name = "pxi-embeddings-staging"

[env.staging.ai]
binding = "AI"

[[env.staging.kv_namespaces]]
binding = "ML_MODELS"
id = "00000000000000000000000000000001"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "00000000000000000000000000000002"

[env.staging.vars]
DEPLOY_ENV = "staging"
BUILD_SHA = "local-dev"
BUILD_TIMESTAMP = "1970-01-01T00:00:00.000Z"
WORKER_VERSION = "pxi-dev"
FEATURE_ENABLE_BRIEF = "true"
FEATURE_ENABLE_OPPORTUNITIES = "true"
FEATURE_ENABLE_ALERTS_IN_APP = "true"
FEATURE_ENABLE_ALERTS_EMAIL = "false"
FEATURE_ENABLE_PLAN = "true"
FEATURE_ENABLE_OPPORTUNITY_COHERENCE_GATE = "true"
FEATURE_ENABLE_CALIBRATION_DIAGNOSTICS = "true"
FEATURE_ENABLE_EDGE_DIAGNOSTICS = "true"
FEATURE_ENABLE_SIGNALS_SANITIZER = "true"
FEATURE_ENABLE_DECISION_IMPACT = "true"
FEATURE_ENABLE_CTA_INTENT_TRACKING = "true"
FEATURE_ENABLE_DECISION_IMPACT_ENFORCE = "true"
DECISION_IMPACT_ENFORCE_MIN_SAMPLE = "30"
DECISION_IMPACT_ENFORCE_MIN_ACTIONABLE_SESSIONS = "10"
ALERTS_FROM_EMAIL = "alerts@pxicommand.com"

[env.production]
name = "pxi-api"
routes = [
  { pattern = "api.pxicommand.com", custom_domain = true },
  { pattern = "www.pxicommand.com/*", zone_name = "pxicommand.com" }
]

[[env.production.d1_databases]]
binding = "DB"
database_name = "pxi-db"
database_id = "2254a52c-11b6-40a6-8881-ef6880f70d21"
migrations_dir = "migrations"

[[env.production.vectorize]]
binding = "VECTORIZE"
index_name = "pxi-embeddings"

[env.production.ai]
binding = "AI"

[[env.production.kv_namespaces]]
binding = "ML_MODELS"
id = "88901ff0216a484eb81b8004be0f5aea"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "e9d69a554ea44727b185127ea67e6932"

[[env.production.send_email]]
name = "EMAIL_OUTBOUND"

[env.production.vars]
DEPLOY_ENV = "production"
BUILD_SHA = "local-dev"
BUILD_TIMESTAMP = "1970-01-01T00:00:00.000Z"
WORKER_VERSION = "pxi-dev"
FEATURE_ENABLE_BRIEF = "true"
FEATURE_ENABLE_OPPORTUNITIES = "true"
FEATURE_ENABLE_ALERTS_IN_APP = "true"
FEATURE_ENABLE_ALERTS_EMAIL = "true"
FEATURE_ENABLE_PLAN = "true"
FEATURE_ENABLE_OPPORTUNITY_COHERENCE_GATE = "true"
FEATURE_ENABLE_CALIBRATION_DIAGNOSTICS = "true"
FEATURE_ENABLE_EDGE_DIAGNOSTICS = "true"
FEATURE_ENABLE_SIGNALS_SANITIZER = "true"
FEATURE_ENABLE_DECISION_IMPACT = "true"
FEATURE_ENABLE_CTA_INTENT_TRACKING = "true"
FEATURE_ENABLE_DECISION_IMPACT_ENFORCE = "true"
DECISION_IMPACT_ENFORCE_MIN_SAMPLE = "30"
DECISION_IMPACT_ENFORCE_MIN_ACTIONABLE_SESSIONS = "10"
ALERTS_FROM_EMAIL = "alerts@pxicommand.com"

[env.fallback]
name = "pxi-api"

[[env.fallback.d1_databases]]
binding = "DB"
database_name = "pxi-db"
database_id = "2254a52c-11b6-40a6-8881-ef6880f70d21"
migrations_dir = "migrations"

[[env.fallback.vectorize]]
binding = "VECTORIZE"
index_name = "pxi-embeddings"

[env.fallback.ai]
binding = "AI"

[[env.fallback.kv_namespaces]]
binding = "ML_MODELS"
id = "88901ff0216a484eb81b8004be0f5aea"

[[env.fallback.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "e9d69a554ea44727b185127ea67e6932"

[[env.fallback.send_email]]
name = "EMAIL_OUTBOUND"

[env.fallback.vars]
DEPLOY_ENV = "fallback"
BUILD_SHA = "local-dev"
BUILD_TIMESTAMP = "1970-01-01T00:00:00.000Z"
WORKER_VERSION = "pxi-dev"
FEATURE_ENABLE_BRIEF = "true"
FEATURE_ENABLE_OPPORTUNITIES = "true"
FEATURE_ENABLE_ALERTS_IN_APP = "true"
FEATURE_ENABLE_ALERTS_EMAIL = "true"
FEATURE_ENABLE_PLAN = "true"
FEATURE_ENABLE_OPPORTUNITY_COHERENCE_GATE = "true"
FEATURE_ENABLE_CALIBRATION_DIAGNOSTICS = "true"
FEATURE_ENABLE_EDGE_DIAGNOSTICS = "true"
FEATURE_ENABLE_SIGNALS_SANITIZER = "true"
FEATURE_ENABLE_DECISION_IMPACT = "true"
FEATURE_ENABLE_CTA_INTENT_TRACKING = "true"
FEATURE_ENABLE_DECISION_IMPACT_ENFORCE = "true"
DECISION_IMPACT_ENFORCE_MIN_SAMPLE = "30"
DECISION_IMPACT_ENFORCE_MIN_ACTIONABLE_SESSIONS = "10"
ALERTS_FROM_EMAIL = "alerts@pxicommand.com"

