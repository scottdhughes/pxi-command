name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Verify build metadata artifact
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const filePath = path.resolve(process.cwd(), 'dist/build.json');
          const payload = JSON.parse(fs.readFileSync(filePath, 'utf8'));

          if (typeof payload.generated_at !== 'string' || Number.isNaN(Date.parse(payload.generated_at))) {
            throw new Error('frontend build.json is missing a valid generated_at field');
          }
          if (typeof payload.commit_sha !== 'string' || payload.commit_sha.trim().length === 0) {
            throw new Error('frontend build.json is missing commit_sha');
          }
          if (typeof payload.branch !== 'string' || payload.branch.trim().length === 0) {
            throw new Error('frontend build.json is missing branch');
          }
          NODE

  worker:
    name: Worker Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run build
      - name: Worker typecheck
        run: npm run typecheck:worker
      - name: Worker tests
        run: npm run test:worker
      - name: Contract tests
        run: npm run test:contracts
      - name: Unit tests
        run: node --test dist/config/indicator-sla.test.js dist/pipeline/cron-fast.test.js

  signals:
    name: Signals Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: signals
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  smoke:
    name: Route + API Smoke
    runs-on: ubuntu-latest
    needs:
      - frontend
      - worker
      - signals
    env:
      SITE_URL: https://pxicommand.com
      API_URL: https://api.pxicommand.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify route pages
        run: |
          set -euo pipefail

          check_api_status() {
            local path="$1"
            local expected="$2"
            local code
            code=$(curl -sS -o /tmp/api.out -w "%{http_code}" --max-time 20 "$API_URL$path")
            if [[ "$code" != "$expected" ]]; then
              echo "Expected $expected for API $path but got $code"
              exit 1
            fi
          }

          check_site_json_status() {
            local path="$1"
            local expected="$2"
            local code
            code=$(curl -sS -D /tmp/site-json.headers -o /tmp/site-json.out -w "%{http_code}" --max-time 20 "$SITE_URL$path")
            if [[ "$code" != "$expected" ]]; then
              echo "Expected $expected for $path but got $code"
              exit 1
            fi
            if ! grep -qi "^content-type: application/json" /tmp/site-json.headers; then
              echo "Expected application/json content type for $path"
              cat /tmp/site-json.headers
              exit 1
            fi
          }

          bash scripts/site-route-smoke.sh "$SITE_URL"
          check_site_json_status "/signals/api/runs" 200
          check_site_json_status "/signals/api/accuracy" 200
          check_site_json_status "/signals/api/predictions" 200
          check_site_json_status "/signals/api/runs?status=foo" 400
          check_api_status "/health" 200
          check_api_status "/api/pxi" 200
          check_api_status "/api/history" 200
          check_api_status "/api/alerts?limit=5" 200
          check_api_status "/api/category/macro" 200
          check_api_status "/api/signal" 200
          check_api_status "/api/diagnostics/calibration?metric=conviction&horizon=7d" 200
          check_api_status "/api/ops/freshness-slo" 200
          DECISION_IMPACT_REQUIRED=1 \
          GO_LIVE_READINESS_REQUIRED=1 \
          DECISION_GRADE_REQUIRED=1 \
          UTILITY_FUNNEL_REQUIRED=1 \
          EDGE_DIAGNOSTICS_REQUIRED=1 \
          bash scripts/api-product-contract-check.sh "$API_URL"

          # CORS preflight for admin endpoint (no auth check expected, only CORS response)
          code=$(curl -sS -o /tmp/preflight.out -w "%{http_code}" --max-time 20 -X OPTIONS \
            -H "Origin: https://pxicommand.com" \
            -H "Access-Control-Request-Method: POST" \
            -H "Access-Control-Request-Headers: Content-Type, Authorization, X-Admin-Token" \
            "$API_URL/api/refresh")
          if [[ "$code" != "204" && "$code" != "200" ]]; then
            echo "Expected CORS preflight 200/204 but got $code"
            exit 1
          fi

          # Backfill validation path (should fail validation without valid credentials)
          code=$(curl -sS -o /tmp/backfill.out -w "%{http_code}" --max-time 20 -X POST \
            -H "Content-Type: application/json" \
            -d '{"start":"not-a-date","end":"also-bad","limit":"bad"}' \
            "$API_URL/api/backfill")
          if [[ "$code" != "400" && "$code" != "401" ]]; then
            echo "Expected 400 or 401 for invalid backfill payload but got $code"
            exit 1
          fi
